name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-macos:
    name: macOS build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build vendored venv and collect app code
        run: |
          chmod +x ./scripts/build-venv.sh
          ./scripts/build-venv.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: desktop-app/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('desktop-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Node and build UI assets
        working-directory: desktop-app
        run: |
          npm ci
          npm run build:css

      - name: Package macOS (arm64)
        working-directory: desktop-app
        run: |
          npx electron-packager . "CycleSafe Studio" --platform=darwin --arch=arm64 --icon=assets/icon.icns --out=./build --overwrite
          if [ -d "build/CycleSafe Studio-darwin-arm64/CycleSafe Studio.app" ]; then
            mv "build/CycleSafe Studio-darwin-arm64/CycleSafe Studio.app" "CycleSafe Studio-darwin-arm64.app"
            zip -r CycleSafe_Studio_macos_arm64.zip "CycleSafe Studio-darwin-arm64.app"
          else
            echo "arm64 .app not found"
            exit 1
          fi

      - name: Package macOS (x64)
        working-directory: desktop-app
        run: |
          npx electron-packager . "CycleSafe Studio" --platform=darwin --arch=x64 --icon=assets/icon.icns --out=./build --overwrite
          if [ -d "build/CycleSafe Studio-darwin-x64/CycleSafe Studio.app" ]; then
            mv "build/CycleSafe Studio-darwin-x64/CycleSafe Studio.app" "CycleSafe Studio-darwin-x64.app"
            zip -r CycleSafe_Studio_macos_x64.zip "CycleSafe Studio-darwin-x64.app"
          else
            echo "x64 .app not found"
            exit 1
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CycleSafe_Studio_macos
          path: |
            desktop-app/CycleSafe_Studio_macos_arm64.zip
            desktop-app/CycleSafe_Studio_macos_x64.zip

  build-windows:
    name: Windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and build UI
        working-directory: desktop-app
        run: |
          npm ci
          npm run build:css
          REM Generating Windows build (electron-packager)
          npx electron-packager . "CycleSafe Studio" --platform=win32 --arch=x64 --out=./build --overwrite

      - name: Zip Windows artifact
        working-directory: desktop-app
        shell: bash
        run: |
          if [ -d "build" ]; then
            cd build
            zip -r CycleSafe_Studio_windows.zip . || true
            mv CycleSafe_Studio_windows.zip ../ || true
            cd ..
          else
            echo "Windows build folder not found"
            exit 1
          fi

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CycleSafe_Studio_windows
          path: desktop-app/CycleSafe_Studio_windows.zip
