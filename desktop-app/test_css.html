<html>
<head>
<style>
  body { margin: 0; background: #333; color: white; display:flex; flex-direction: column; height: 100vh;}
  .p-6 { padding: 24px; box-sizing: border-box; display: flex; flex-direction: column; height: 100%; }
  .header { height: 50px; background: red; }
  .aspect-video { 
    aspect-ratio: 16/9; 
    background: black; 
    width: 100%; 
    max-height: calc(100vh - 250px);
    max-width: calc((100vh - 250px) * 16 / 9);
    margin: 0 auto;
  }
  .footer { height: 100px; background: blue; margin-top: auto; }
</style>
</head>
<body>
  <div class="p-6">
    <div class="header">Header</div>
    <div class="aspect-video">Video Area</div>
    <div class="footer">Footer</div>
  </div>
</body>
</html>
